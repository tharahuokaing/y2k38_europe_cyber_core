<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Y2K38-GLOBAL Cyber-Core | Huokaing Thara</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kantumruy+Pro:wght@400;700&display=swap');

    :root {
        --holo-cyan: #00d4ff;
        --alert-red: #ff0000;
        --glow-cyan: rgba(0, 212, 255, 0.7);
    }

    body {
        background: #000;
        color: #fff;
        font-family: 'Orbitron', 'Kantumruy Pro', sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    #binary-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        opacity: 0.15;
    }

    main.cyber-container {
        position: relative;
        width: 85vw;
        max-width: 850px;
        height: 85vh;
        background: radial-gradient(circle, rgba(0, 212, 255, 0.05) 0%, rgba(0, 0, 0, 0.98) 90%);
        border-radius: 50%;
        box-sizing: border-box;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(15px);
        animation: float 6s ease-in-out infinite;
        /* HOLOGRAM GLOW */
        box-shadow:
            0 0 20px var(--glow-cyan),
            0 0 40px var(--glow-cyan),
            inset 0 0 70px var(--glow-cyan),
            inset 0 0 100px var(--glow-cyan);
        border: 1px solid var(--glow-cyan);
        overflow: hidden;
    }

    /* animated hologram border ring */
    main.cyber-container::before {
        content: "";
        position: absolute;
        top: -10px; left: -10px; right: -10px; bottom: -10px;
        border-radius: 50%;
        pointer-events: none;
        box-shadow: 0 0 30px var(--glow-cyan);
        animation: holoPulse 4s linear infinite;
        z-index: 0;
    }

    @keyframes holoPulse {
        0%, 100% {
            box-shadow:
                0 0 10px var(--glow-cyan),
                0 0 30px var(--glow-cyan),
                0 0 50px var(--glow-cyan),
                0 0 70px var(--glow-cyan);
        }
        50% {
            box-shadow:
                0 0 20px var(--glow-cyan),
                0 0 50px var(--glow-cyan),
                0 0 80px var(--glow-cyan),
                0 0 100px var(--glow-cyan);
        }
    }

    .lang-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 5px;
        position: absolute;
        top: 5%;
        width: 90%;
        z-index:10;
    }

    .lang-btn {
        background: transparent;
        border: 1px solid var(--holo-cyan);
        color: var(--holo-cyan);
        font-size: 0.6rem;
        cursor: pointer;
        padding: 4px;
        transition: 0.3s;
        font-family: 'Orbitron';
        user-select: none;
    }

    .lang-btn:hover,
    .lang-btn.active {
        background: var(--holo-cyan);
        color: #000;
    }

    .data-display {
        width: 75%;
        max-height: 35%;
        overflow-y: auto;
        margin-top: 10px;
        scrollbar-width: none;
    }

    /* Hover tooltip container */
    .data-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 10px;
        border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        transition: 0.4s;
        cursor: pointer;
        position: relative;
    }

    .data-row:hover {
        transform: scale(1.05);
        background: rgba(0, 212, 255, 0.15);
        color: var(--holo-cyan);
    }
    /* Tooltip text */
    .tooltip-text {
        visibility: hidden;
        width: 200px;
        background-color: rgba(0, 212, 255, 0.9);
        color: black;
        text-align: center;
        border-radius: 6px;
        padding: 6px;
        position: absolute;
        z-index: 1001;
        bottom: 120%;
        left: 50%;
        margin-left: -100px;
        font-size: 0.75rem;
        line-height: 1.2;
        user-select:none;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .data-row:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
    }

    #breach-overlay {
        display: none;
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
        border: 4px solid var(--alert-red);
        z-index: 1000;
        pointer-events: none;
    }

    .horror-text {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--alert-red);
        font-size: 2rem;
        text-shadow: 0 0 20px red;
        text-align: center;
        user-select:none;
    }

    @keyframes float {
        0%,
        100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-15px);
        }
    }

    select {
        background: #000;
        color: var(--holo-cyan);
        border: 1px solid var(--holo-cyan);
        padding: 8px;
        border-radius: 20px;
        font-family: 'Orbitron';
        width: 280px;
        margin-bottom: 15px;
        cursor: pointer;
        user-select:none;
    }

    #mute-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--holo-cyan);
        border: none;
        padding: 10px 15px;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        color: #000;
        user-select:none;
        z-index: 1500;
        box-shadow: 0 0 10px var(--holo-cyan);
        transition: background 0.3s ease;
    }
    #mute-btn:hover {
        background: #00a9cc;
    }

    /* Countdown Timer Style */
    #countdown-container {
        margin-top: 12px;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--holo-cyan);
        user-select:none;
    }
</style>
</head>

                { name: "PEN TEST", desc: "Simuleer infrastructuuraanvallen om kwetsbaarheden te ontdekken." },

            ]
        },
        pl: {
            title: "RDZEŃ BEZPIECZEŃSTWA GLOBAL",
            alert: "KRYTYCZNE WŁAMANIE",
            label: "CAŁKOWITY KOSZT",
            foot: "ARCHITEKT:",
            steps: [
                { name: "MODEL ZAGROŻEŃ", desc: "Identyfikacja i ocena potencjalnych zagrożeń dla zasobów globalnych." },
                { name: "AUDYT BINARNY", desc: "Ocena skompilowanego kodu pod kątem anomalii epoki Unixa." },
                { name: "TESTY PEN", desc: "Symulacja ataków na infrastrukturę w celu wykrycia podatności." },
                { name: "KONTROLA ABI", desc: "Weryfikacja integralności interfejsu binarnego aplikacji." }

        },
        se: {

            alert: "KRITISKT INBROTT",

            steps: [
                { name: "HOTMODELLERING", desc: "Identifiera och bedöma potentiella risker för globala tillgångar." },
                { name: "BINÄR REVISION", desc: "Utvärdera kompilerad kod för Unix-epoch anomalier." },
                { name: "PEN-TEST", desc: "Simulera infrastrukturattacker för att upptäcka sårbarheter." },

            ]
        },

            alert: "KRIITTINEN MURTO",
            label: "KOKONAISKUSTANNUS",
            foot: "ARKKITEHTI:",
            steps: [
                { name: "UHKAMALLINNUS", desc: "Tunnista ja arvioi globaaleihin järjestelmiin kohdistuvat uhat." },
                { name: "BINÄÄRIAUDITOINTI", desc: "Arvioi käännettyä koodia Unix-aikakauden poikkeamien varalta." },
                { name: "PEN-TESTAUS", desc: "Simuloi hyökkäyksiä haavoittuvuuksien havaitsemiseksi." },
                { name: "ABI-TARKISTUS", desc: "Varmista Application Binary Interface -rajapinnan eheys." }
            ]
        },
        no: {
            title: "GLOBAL SIKKERHETSKJERNE",
            alert: "KRITISKT BRUDD",
            label: "TOTAL KOSTNAD",
            foot: "ARKITEKT:",
            steps: [
                { name: "TRUSSELMODELL", desc: "Identifiser og vurder potensielle farer for globale systemer." },
                { name: "BINÆR REVISJON", desc: "Evaluer kompilert kode for Unix-epokeanomalier." },
                { name: "PEN-TEST", desc: "Simuler infrastrukturangrep for å oppdage sårbarheter." },
                { name: "ABI-KONTROLL", desc: "Verifiser integriteten til Application Binary Interface." }
            ]

    let currentL = "en";
    let audioCtx = null;
    const synth = window.speechSynthesis;
    const dnsLink = "https://tharahuokaing.github.io/Y2K38_Problem/";

    // Y2K38 overflow timestamp (seconds): Jan 19 2038 03:14:07 UTC
    const Y2K38Timestamp = 2147483647;

    const costPerHour = 8000;
    const hoursInDay = 24;

    function speakText(text, isHorror = false) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        
        const langMap = { en: "en-US", de: "de-DE", fr: "fr-FR", es: "es-ES", ru: "ru-RU", it: "it-IT", nl: "nl-NL", pl: "pl-PL", se: "sv-SE", fi: "fi-FI", no: "no-NO" };
        utter.lang = langMap[currentL] || "en-US";
        
        utter.pitch = isHorror ? 0.1 : 1.0;
        utter.rate = isHorror ? 0.5 : 1.0;
        utter.volume = 1.0;
        synth.speak(utter);
    }

    // BINARY RAIN
    const canvas = document.getElementById("binary-canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 14)).fill(1);
    function drawB() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = document.getElementById("main-frame").classList.contains("breach-active") ? "#f00" : "#0f0";
        ctx.font = "14px Orbitron";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random() * 2), i * 14, y * 14);
            if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawB, 33);

    // FREQUENCY AUDIO
    function playH() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);
    }

    function setLang(l, event) {
        currentL = l;
        document.querySelectorAll(".lang-btn").forEach((b) => {
            b.classList.remove("active");
            b.setAttribute("aria-pressed", "false");
        });
        if (event && event.target) {
            event.target.classList.add("active");
            event.target.setAttribute("aria-pressed", "true");
        }
        const t = translations[l];
        document.getElementById("title").innerText = t.title;
        document.getElementById("total-label").innerText = t.label;
        document.getElementById("footer-text").innerText = t.foot;
        document.getElementById("alert-msg").innerText = t.alert;
        speakText(t.title);
        calculateAudit();
    }

    function calculateAudit() {
        const sel = document.getElementById("country-select");
        const mult = parseFloat(sel.value);
        const countryText = sel.options[sel.selectedIndex].text;

        if (countryText.includes("RUSSIA")) {
            document.getElementById("main-frame").classList.add("breach-active");
            document.getElementById("breach-overlay").style.display = "block";
            speakText(translations[currentL].alert, true);
            let c = 0;
            const t = setInterval(() => {
                playH();
                c++;
                if (c > 10) {
                    clearInterval(t);
                    document.getElementById("main-frame").classList.remove("breach-active");
                    document.getElementById("breach-overlay").style.display = "none";
                }
            }, 100);
        } else {
            speakText(countryText);
        }

        // Steps and dollar cost allocation
        const list = document.getElementById("data-list");
        list.innerHTML = "";
        let tot = 0;
        const costs = [9500, 6500, 26000, 14000];
        translations[currentL].steps.forEach(({name,desc}, i) => {
            const c = costs[i] * mult;
            tot += c;
            const r = document.createElement("div");
            r.className = "data-row";
            r.setAttribute("role", "listitem");
            r.innerHTML = `<span>${name}</span><span>$${c.toLocaleString()}</span><div class="tooltip-text">${desc}</div>`;
            r.onclick = (e) => {
                e.stopPropagation();
                window.open(dnsLink, "_blank", "noopener");
                speakText(name + " cost is " + c + " dollars");
            };
            list.appendChild(r);
        });
        document.getElementById("final-total").innerText = `$${Math.round(tot * (0.98 + Math.random() * 0.04)).toLocaleString()}`;

        updateY2K38CostAndCountdown();
    }

    // Y2K38 countdown and cost update
    function updateY2K38CostAndCountdown() {
        const now = Math.floor(Date.now() / 1000); 
        let secondsLeft = Y2K38Timestamp - now;
        if(secondsLeft < 0) secondsLeft = 0;

        const days = Math.floor(secondsLeft / 86400);
        const hours = Math.floor((secondsLeft % 86400) / 3600);
        const minutes = Math.floor((secondsLeft % 3600) / 60);
        const seconds = secondsLeft % 60;

        const countdownStr = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        document.getElementById("countdown").textContent = countdownStr;

        const cost24h = costPerHour * hoursInDay;
        const costNow = secondsLeft > hoursInDay * 3600 ? cost24h : Math.ceil(costPerHour * (secondsLeft / 3600));
        document.getElementById("y2k38-cost").textContent = `$${costNow.toLocaleString()}`;
    }

    // Timer live ID display update
    setInterval(() => {
        document.getElementById("live-timer").innerText = `T: ${new Date().toLocaleTimeString()} | ID: GLOB_${Math.random()
            .toString(16)
            .slice(2, 6)
            .toUpperCase()}`;
    }, 1000);

    // Update countdown every second
    setInterval(updateY2K38CostAndCountdown, 1000);

    // Initialization
    calculateAudit();

    // Mute button toggle for background music
    const bgMusic = document.getElementById('background-music');
    const muteBtn = document.getElementById('mute-btn');
    muteBtn.addEventListener('click', () => {
        if (bgMusic.muted) {
            bgMusic.muted = false;
            muteBtn.innerText = "Mute Music";
            muteBtn.setAttribute('aria-pressed', 'false');
        } else {
            bgMusic.muted = true;
            muteBtn.innerText = "Unmute Music";
            muteBtn.setAttribute('aria-pressed', 'true');
        }
    });
</script>
</body>
</html>
